<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>現代軟體工程互動學習地圖</title>
  <meta name="description" content="用可閱讀、可互動、可校對的方式學習測試、自動化、效能與觀測性核心概念。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="#top" aria-label="回到首頁">
        <span class="brand-mark"></span>
        <span>
          <strong>現代軟體工程互動學習地圖</strong>
          <small>12 個核心維度，從看得懂到能判斷</small>
        </span>
      </a>
      <nav class="top-actions" aria-label="頁面操作">
        <button class="icon-button" id="themeToggle" type="button" title="切換亮暗色">◐</button>
        <a class="secondary-link" href="#sources">校對來源</a>
      </nav>
    </header>

    <main id="top" class="layout">
      <aside class="rail" aria-label="學習單元">
        <div class="rail-tools">
          <label class="search-box">
            <span>搜尋</span>
            <input id="searchInput" type="search" placeholder="例如：突變測試、Newman、P95">
          </label>
          <div class="stage-tabs" id="stageTabs" role="tablist" aria-label="階段篩選"></div>
        </div>
        <div class="progress-card">
          <div>
            <strong id="progressText">0 / 12</strong>
            <span>已完成理解檢核</span>
          </div>
          <div class="progress-track"><span id="progressBar"></span></div>
        </div>
        <ol class="lesson-list" id="lessonList"></ol>
      </aside>

      <section class="reader" id="reader" aria-live="polite"></section>
    </main>

    <section id="sources" class="sources-band">
      <div class="sources-inner">
        <h2>校對來源與使用方式</h2>
        <p>本頁的定義以官方文件與常見工程文獻為主，案例是教學化改寫。閱讀時請把互動練習當成「理解模型」，不是完整工具替代品。</p>
        <div class="source-grid" id="sourceGrid"></div>
      </div>
    </section>
  </div>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
